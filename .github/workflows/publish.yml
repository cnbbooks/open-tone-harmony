# Build and deploy the mdBook site to GitHub Pages, plus attach EPUB to
# a rolling "latest" release whenever main builds cleanly, and proper
# versioned releases on v* tags.

name: Publish book content to GH Pages

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write       # needed to create/update releases
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cargo-bins/cargo-binstall@main

      - name: Install mdBook toolchain
        run: |
          cargo binstall --no-confirm mdbook
          cargo binstall --no-confirm mdbook-mermaid
          cargo binstall --no-confirm mdbook-epub

      # Python is pre-installed on ubuntu-latest runners; this step is
      # here to pin a specific version and make the dependency explicit.
      - name: Set up Python (for EPUB preprocessor)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch fonts
        run: |
          chmod +x scripts/fetch-fonts.sh
          ./scripts/fetch-fonts.sh

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with mdBook
        run: mdbook build

      - name: Rename EPUB for release
        run: |
          # mdbook-epub names the file based on the book title.
          EPUB_SRC="book/epub/oth.epub"
          if [[ ! -f "$EPUB_SRC" ]]; then
            echo "::error::Expected $EPUB_SRC does not exist. EPUB build may have failed silently."
            ls -la book/epub/ || true
            exit 1
          fi
          cp "$EPUB_SRC" book/epub/oth-latest.epub
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            cp "$EPUB_SRC" "book/epub/oth-${VERSION}.epub"
          fi

      - name: Sanity-check EPUB contents
        run: |
          echo "=== Fonts packaged ==="
          unzip -l book/epub/oth.epub | grep -iE '\.ttf$' | wc -l
          echo "=== Stylesheet packaged ==="
          unzip -l book/epub/oth.epub | grep -i stylesheet.css
          echo "=== Chapter image count ==="
          unzip -l book/epub/oth.epub | grep -cE 'ch[0-9]+\.png'

      - name: Upload HTML artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book/html

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: epub
          path: book/epub/*.epub
          retention-days: 30

      # Rolling "latest" release from main — always reflects the current build.
      - name: Update rolling latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automatically updated EPUB from the latest `main` commit.
            For a stable version, see tagged releases.
          files: book/epub/oth-latest.epub
          prerelease: true

      # Proper versioned release when a v* tag is pushed.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: book/epub/oth-*.epub
          generate_release_notes: true

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
