[book]
title = "Open Tone Harmony"
authors = ["Duncan McGreggor"]
description = "A Non-Triadic Music System — Formalisation • Exploration • Composition"
language = "en"

[build]
build-dir = "book"

[preprocessor.index]

[preprocessor.links]

[preprocessor.mermaid]
command = "mdbook-mermaid"

# EPUB-only preprocessor: rewrites relative image paths so they resolve
# correctly under mdbook-epub. mdbook-epub v0.5.2 joins paths as
# 'root + src + path' rather than relative to the containing markdown file,
# so '../../images/foo.png' fails. This preprocessor runs only for EPUB
# builds (via `renderers = ["epub"]`) and normalizes paths to be src-rooted.
# Source files stay pristine; HTML build is untouched.
#
# When mdbook-epub fixes this upstream, remove these two lines.
[preprocessor.epub-image-paths]
command = "./scripts/mdbook-epub-image-paths.py"
renderers = ["epub"]

[output.html]
no-section-label = true
default-theme = "lfe-pdp"
preferred-dark-theme = "lfe-pdp"
additional-js = ["js/mermaid.min.js", "js/mermaid-init.js"]
additional-css = ["css/custom.css"]
git-repository-url = "https://github.com/cnbbooks/open-tone-harmony"

[output.html.search]
limit-results = 20
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 2

[output.html.fold]
enable = true

# ============================================================================
# EPUB output
# ============================================================================
#
# Install: cargo install mdbook-epub
# Build:   mdbook build  (produces book/epub/oth.epub)
#
# Font files must exist at theme/fonts/ before building. See scripts/fetch-fonts.sh
# for a one-shot downloader that pulls them from Google Fonts' open-source repo.

[output.epub]
epub-version = 3
use-default-css = false       # we ship our own, matched to the lfe-pdp theme
curly-quotes = false          # known bug with code blocks on some versions
no-section-label = true       # match HTML behaviour
cover-image = "src/images/cover.png"
additional-css = ["css/epub.css"]

# Fonts. Chapter images (src/images/ch*.png etc.) are picked up automatically
# from markdown references; these entries are only for files that need to
# be in the EPUB package but aren't referenced from any chapter.
additional-resources = [
  "theme/fonts/RedHatDisplay-Variable.ttf",
  "theme/fonts/RedHatDisplay-Italic-Variable.ttf",
  "theme/fonts/Literata-Variable.ttf",
  "theme/fonts/Literata-Italic-Variable.ttf",
  "theme/fonts/IBMPlexMono-Regular.ttf",
  "theme/fonts/IBMPlexMono-Medium.ttf",
  "theme/fonts/IBMPlexMono-SemiBold.ttf",
  "theme/fonts/IBMPlexMono-Italic.ttf",
]

